name: Package Sorter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest test_sort -v

      - name: Verify server starts
        run: |
          python app.py &
          sleep 2
          curl -sf http://127.0.0.1:5000/ > /dev/null
          curl -sf -X POST http://127.0.0.1:5000/api/sort \
            -H 'Content-Type: application/json' \
            -d '{"width":10,"height":10,"length":10,"mass":5}' | grep STANDARD
          echo "Server health check passed"
